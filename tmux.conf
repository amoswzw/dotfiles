# tmux config

# remap prefix from 'C-b' to 'C-w'
unbind C-b
set-option -g prefix C-w
bind-key C-w send-prefix

# use vi mode
setw -g mode-keys vi
set -g status-keys vi

# vim style copy paste mode
unbind [
bind Escape copy-mode
unbind p
bind p paste-buffer
bind-key -Tcopy-mode-vi 'v' send -X begin-selection
bind-key -Tcopy-mode-vi 'y' send -X copy-pipe-and-cancel 'pbcopy'
bind-key -Tcopy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel 'pbcopy'

# split panes using | and -
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

unbind n
unbind p
unbind ,
unbind .
bind , previous-window
bind . next-window

# config escape time
set -sg escape-time 0

# Use the xterm-256color terminal
set -g default-terminal "xterm-256color"

# Apply Tc
set-option -ga terminal-overrides ",xterm-256color:Tc"

bind -r C-l resize-pane -R 10
bind -r C-j resize-pane -D 10
bind -r C-k resize-pane -U 10
bind -r C-h resize-pane -L 10

# Enable mouse mode
set -g mouse on
set -g automatic-rename off

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
#set -g @plugin 'tmux-plugins/tmux-resurrect'
#set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'christoomey/vim-tmux-navigator'
set-option -g focus-events on

# ---- Refined Status Bar (Catppuccin Mocha) ----
set -g status on
set -g status-position bottom
set -g status-interval 5
set -g status-style "bg=default,fg=#cdd6f4"
set -g status-left-length 60
set -g status-right-length 100

set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#cba6f7"
set -g window-style "bg=default"
set -g window-active-style "bg=default"
set -g message-style "bg=#313244,fg=#cdd6f4"

set -g status-left "#[bg=default,fg=default] #[bg=#89b4fa,fg=#11111b,bold] #S #[bg=default,fg=#89b4fa,nobold,noitalics,nounderscore]"

set -g window-status-separator ""
set -g window-status-format ""
set -g window-status-current-format ""
set -g window-status-activity-style "fg=#f9e2af,bold"
set -g window-status-bell-style "bg=#f38ba8,fg=#11111b,bold"

set -g status-right "#[bg=default,fg=#fab387,nobold,noitalics,nounderscore]#[bg=#fab387,fg=#11111b,bold] %H:%M #[bg=#313244,fg=#f9e2af] %a %d %b #[fg=#89b4fa]#(whoami)@#h #[bg=default,fg=default]"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run-shell -b "/bin/bash $HOME/.tmux/plugins/tpm/tpm >/dev/null 2>&1 || true"
